<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Qudz Motors</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">QUDZ MOTORS - ADMIN</div>
    </header>

    <section class="admin-login" id="loginSection">
      <h2>Admin Login</h2>
      <input type="password" id="adminPassword" placeholder="Enter password" />
      <button onclick="login()">Login</button>
    </section>

    <section class="admin-dashboard" id="dashboardSection" style="display: none">
      <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('cars')">Manage Cars</button>
        <button class="tab-btn" onclick="switchTab('news')">Manage News</button>
      </div>

      <div id="carsTab" class="tab-content active">
        <h2>Manage Cars</h2>
        <div class="crud-form">
          <h3>Add/Edit Car</h3>
          <input type="text" id="carBrand" placeholder="Brand" />
          <input type="text" id="carName" placeholder="Name" />
          <input type="number" id="carYear" placeholder="Year" />
          <input type="number" id="carPrice" placeholder="Price (USD)" />
          <input type="text" id="carBody" placeholder="Body Type" />
          <input type="text" id="carImage" placeholder="Image URL" />
          <input type="text" id="carTooltip" placeholder="Tooltip" />
          <input type="text" id="carDrivetrain" placeholder="Drivetrain" />
          <input type="text" id="carEngine" placeholder="Engine" />
          <input type="text" id="carHorsepower" placeholder="Horsepower" />
          <input type="text" id="carTopSpeed" placeholder="Top Speed" />
          <input type="text" id="carAcceleration" placeholder="Acceleration" />
          <button onclick="addCar()">Add Car</button>
        </div>

        <div class="car-table">
          <h3>Car List</h3>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Brand</th>
                <th>Year</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="carTableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="newsTab" class="tab-content">
        <h2>Manage News</h2>
        <div class="crud-form">
          <h3>Add News</h3>
          <input type="text" id="newsTitle" placeholder="Title" />
          <input type="text" id="newsImage" placeholder="Image URL" />
          <textarea id="newsContent" placeholder="Content" rows="10" class="news-content-textarea"></textarea>
          <input type="text" id="newsSource" placeholder="Source" />
          <button onclick="addNews()">Add News</button>
        </div>

        <div class="news-table">
          <h3>News List</h3>
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Date</th>
                <th>Source</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="newsTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <script src="admin.js"></script>
  </body>
</html>
